{% extends 'base.html' %}

{% block title %}Login - StudyHub{% endblock %}

{% block content %}
<div class="container-lg my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4">
                        <i class="bi bi-lock"></i> Sign In
                    </h2>
                    
                    <form method="POST" action="/login">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control form-control-lg" 
                                   id="email" name="email" required placeholder="your@email.com">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control form-control-lg" 
                                   id="password" name="password" required placeholder="••••••••">
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">
                                Remember me
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="bi bi-box-arrow-in-right"></i> Sign In
                        </button>
                    </form>

                    <hr>

                    <p class="text-center mb-0">
                        Don't have an account? 
                        <a href="/register" class="fw-bold">Register here</a>
                    </p>
                </div>
            </div>

            <div class="alert alert-info mt-4">
                <strong>Demo Credentials:</strong>
                <br>Student: student@example.com / password123
                <br>Teacher: teacher@example.com / password123
            </div>
        </div>
    </div>
</div>
{% endblock %}
