{% extends 'base.html' %}

{% block title %}Create Assignment - StudyHub{% endblock %}

{% block content %}
<div class="container-lg my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4"><i class="bi bi-plus-circle"></i> Create Assignment</h1>

            <form method="POST" enctype="multipart/form-data">
                <div class="card">
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="title" class="form-label">Assignment Title</label>
                            <input type="text" class="form-control form-control-lg" id="title" name="title" required placeholder="e.g., Assignment 1: Introduction">
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="4" placeholder="Provide detailed instructions for the assignment..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="due_date" class="form-label">Due Date</label>
                                <input type="datetime-local" class="form-control" id="due_date" name="due_date" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="total_points" class="form-label">Total Points</label>
                                <input type="number" class="form-control" id="total_points" name="total_points" value="100" min="1" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="file" class="form-label">Attachment (Optional)</label>
                            <input type="file" class="form-control" id="file" name="file">
                            <small class="form-text text-muted">Allowed: PDF, DOC, DOCX, etc. (Max 50MB)</small>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-success btn-lg mt-3">
                    <i class="bi bi-check-circle"></i> Create Assignment
                </button>
                <a href="/course/{{ course.id }}/assignments" class="btn btn-outline-secondary btn-lg mt-3">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
