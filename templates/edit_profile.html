{% extends 'base.html' %}

{% block title %}Edit Profile - StudyHub{% endblock %}

{% block content %}
<div class="container-lg my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="mb-4"><i class="bi bi-pencil"></i> Edit Profile</h1>

            <form method="POST">
                <div class="card">
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control form-control-lg" id="name" name="name" value="{{ user.name }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control form-control-lg" id="email" value="{{ user.email }}" disabled>
                            <small class="form-text text-muted">Email cannot be changed</small>
                        </div>

                        <div class="mb-3">
                            <label for="bio" class="form-label">Bio</label>
                            <textarea class="form-control" id="bio" name="bio" rows="4" placeholder="Tell us about yourself...">{% if user.bio %}{{ user.bio }}{% endif %}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Account Type</label>
                            <input type="text" class="form-control" value="{{ user.role | title }}" disabled>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg mt-3">
                    <i class="bi bi-check-circle"></i> Save Changes
                </button>
                <a href="/profile" class="btn btn-outline-secondary btn-lg mt-3">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
