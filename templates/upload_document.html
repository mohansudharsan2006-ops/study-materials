{% extends "base.html" %}

{% block content %}

<h2 style="text-align: center; color: #333;">Upload Document</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" accept=".doc,.docx,.txt,.ppt,.pptx">
    <button type="submit">Upload Document</button>
</form>

{% if get_flashed_messages() %}
    <div class="flash">
        {% for message in get_flashed_messages() %}
            <p>{{ message }}</p>
        {% endfor %}
    </div>
{% endif %}

{% endblock %}
