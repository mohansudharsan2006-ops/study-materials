{% extends 'base.html' %}

{% block title %}Server Error - StudyHub{% endblock %}

{% block content %}
<div class="container-lg my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h1 class="display-1 text-danger"><i class="bi bi-exclamation-circle"></i></h1>
            <h2 class="mb-3">Server Error</h2>
            <p class="lead text-muted mb-4">Something went wrong on our end. Please try again later.</p>
            
            <a href="/" class="btn btn-primary btn-lg me-2">
                <i class="bi bi-house"></i> Go Home
            </a>
            <a href="/courses" class="btn btn-outline-primary btn-lg">
                <i class="bi bi-book"></i> Browse Courses
            </a>
        </div>
    </div>
</div>
{% endblock %}
