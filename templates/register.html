{% extends 'base.html' %}

{% block title %}Register - StudyHub{% endblock %}

{% block content %}
<div class="container-lg my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4">
                        <i class="bi bi-pencil-square"></i> Create Account
                    </h2>
                    
                    <form method="POST" action="/register">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control form-control-lg" 
                                   id="name" name="name" required placeholder="John Doe">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control form-control-lg" 
                                   id="email" name="email" required placeholder="your@email.com">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control form-control-lg" 
                                   id="password" name="password" required 
                                   placeholder="Minimum 6 characters">
                            <small class="form-text text-muted">At least 6 characters</small>
                        </div>

                        <div class="mb-3">
                            <label for="password_confirm" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control form-control-lg" 
                                   id="password_confirm" name="password_confirm" required 
                                   placeholder="Repeat your password">
                        </div>

                        <div class="mb-3">
                            <label for="role" class="form-label">Account Type</label>
                            <select class="form-select form-select-lg" id="role" name="role">
                                <option value="student" selected>Student (Learn)</option>
                                <option value="teacher">Teacher (Teach)</option>
                            </select>
                            <small class="form-text text-muted">You can change this later in settings</small>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="bi bi-check-circle"></i> Create Account
                        </button>
                    </form>

                    <hr>

                    <p class="text-center mb-0">
                        Already have an account? 
                        <a href="/login" class="fw-bold">Sign in here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
