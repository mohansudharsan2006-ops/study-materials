{% extends "base.html" %}
{% block content %}

<h1 class="title">Search Results</h1>

{% if results %}
    <ul class="topics">
        {% for note in results %}
            <li><a href="#">{{ note.title }}</a> - {{ note.subject_name }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>No results found for "{{ query }}".</p>
{% endif %}

<div class="back">
    <a href="/">Back to Home</a>
</div>

{% endblock %}
