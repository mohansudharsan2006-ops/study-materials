{% extends 'base.html' %}

{% block title %}Create Course - StudyHub{% endblock %}

{% block content %}
<div class="container-lg my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4"><i class="bi bi-book"></i> Create Course</h1>

            <form method="POST">
                <div class="card">
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="name" class="form-label">Course Name</label>
                            <input type="text" class="form-control form-control-lg" id="name" name="name" required placeholder="e.g., Advanced Python Programming">
                        </div>

                        <div class="mb-3">
                            <label for="code" class="form-label">Course Code</label>
                            <input type="text" class="form-control" id="code" name="code" required placeholder="e.g., CS301" maxlength="50">
                            <small class="form-text text-muted">Must be unique across all courses</small>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="4" placeholder="Describe what students will learn in this course..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="department_id" class="form-label">Department</label>
                                <select class="form-select" id="department_id" name="department_id">
                                    <option value="">Select Department</option>
                                    {% for dept in departments %}
                                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="capacity" class="form-label">Student Capacity</label>
                                <input type="number" class="form-control" id="capacity" name="capacity" value="100" min="1" required>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-success btn-lg mt-3">
                    <i class="bi bi-check-circle"></i> Create Course
                </button>
                <a href="/dashboard/teacher" class="btn btn-outline-secondary btn-lg mt-3">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
