{% extends 'base.html' %}

{% block title %}Upload Resource - StudyHub{% endblock %}

{% block content %}
<div class="container-lg my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4"><i class="bi bi-upload"></i> Upload Resource</h1>

            <form method="POST" enctype="multipart/form-data">
                <div class="card">
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="title" class="form-label">Resource Title</label>
                            <input type="text" class="form-control form-control-lg" id="title" name="title" required placeholder="e.g., Python Basics Tutorial">
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="4" placeholder="Describe this resource..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="resource_type" class="form-label">Resource Type</label>
                                <select class="form-select" id="resource_type" name="resource_type" required>
                                    <option value="">Select Type</option>
                                    <option value="pdf">PDF Document</option>
                                    <option value="document">Document (DOC/DOCX)</option>
                                    <option value="image">Image</option>
                                    <option value="video">Video</option>
                                    <option value="link">External Link</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="subject_id" class="form-label">Subject</label>
                                <select class="form-select" id="subject_id" name="subject_id">
                                    <option value="">Select Subject</option>
                                    {% for subject in subjects %}
                                    <option value="{{ subject.id }}">{{ subject.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="file" class="form-label">Upload File</label>
                            <input type="file" class="form-control form-control-lg" id="file" name="file" required>
                            <small class="form-text text-muted">Allowed: PDF, DOC, DOCX, JPG, PNG, MP4, etc. (Max 50MB)</small>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-success btn-lg mt-3">
                    <i class="bi bi-check-circle"></i> Upload Resource
                </button>
                <a href="/resources" class="btn btn-outline-secondary btn-lg mt-3">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
